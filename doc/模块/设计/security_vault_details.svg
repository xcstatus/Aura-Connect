<svg width="600" height="500" viewBox="0 0 600 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="500" rx="12" fill="#1C1C1E"/>
  
  <!-- Tab Bar -->
  <text x="240" y="40" fill="#00FF80" font-family="Inter, sans-serif" font-weight="600" font-size="14">Vault</text>
  <rect x="235" y="55" width="40" height="2" fill="#00FF80"/>
  <text x="310" y="40" fill="#A0A0A5" font-family="Inter, sans-serif" font-size="14">Hosts</text>
  <rect x="0" y="59" width="600" height="1" fill="#3A3A3F"/>
  
  <!-- Section 1: Auto-Lock -->
  <text x="24" y="90" fill="#FFFFFF" font-family="Inter, sans-serif" font-weight="600" font-size="16">Auto-Lock</text>
  <text x="24" y="110" fill="#A0A0A5" font-family="Inter, sans-serif" font-size="12">Automatically secure your vault access.</text>
  
  <!-- Switch: Lock on Sleep -->
  <text x="350" y="100" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="13">Lock on Sleep</text>
  <rect x="530" y="88" width="44" height="24" rx="12" fill="#00FF80"/>
  <circle cx="562" cy="100" r="10" fill="#FFFFFF"/>
  
  <!-- Switch: Lock on Background -->
  <text x="350" y="140" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="13">Lock on Background</text>
  <rect x="530" y="128" width="44" height="24" rx="12" fill="#3A3A3F"/>
  <circle cx="542" cy="140" r="10" fill="#777777"/>

  <!-- Dropdown: Idle timeout -->
  <text x="24" y="180" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="13">Idle timeout</text>
  <rect x="350" y="165" width="224" height="32" rx="6" stroke="#00FF80" fill="transparent"/>
  <text x="362" y="186" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="13">10 minutes</text>
  <path d="M555 180L560 185L565 180" stroke="#00FF80" stroke-width="2"/>
  
  <rect x="24" y="215" width="552" height="1" fill="#3A3A3F"/>
  
  <!-- Section 2: Master Password -->
  <text x="24" y="245" fill="#FFFFFF" font-family="Inter, sans-serif" font-weight="600" font-size="16">Master Password</text>
  <text x="24" y="265" fill="#A0A0A5" font-family="Inter, sans-serif" font-size="12">Change your primary vault passphrase.</text>
  
  <rect x="24" y="290" width="140" height="32" rx="6" fill="#00FF80"/>
  <text x="42" y="311" fill="#000000" font-family="Inter, sans-serif" font-weight="600" font-size="13">Change Password</text>
  
  <!-- Strength Meter -->
  <rect x="220" y="295" width="40" height="4" rx="2" fill="#00FF80"/>
  <rect x="265" y="295" width="40" height="4" rx="2" fill="#00FF80"/>
  <rect x="310" y="295" width="40" height="4" rx="2" fill="#00FF80"/>
  <rect x="355" y="295" width="40" height="4" rx="2" fill="#3A3A3F"/>
  <rect x="400" y="295" width="40" height="4" rx="2" fill="#3A3A3F"/>
  <text x="220" y="315" fill="#00FF80" font-family="Inter, sans-serif" font-size="10">Strength: Strong</text>
  <text x="310" y="315" fill="#A0A0A5" font-family="Inter, sans-serif" font-size="10">Last changed: 3 days ago</text>

  <rect x="24" y="345" width="552" height="1" fill="#3A3A3F"/>

  <!-- Section 3: Biometrics -->
  <text x="24" y="375" fill="#FFFFFF" font-family="Inter, sans-serif" font-weight="600" font-size="16">Biometrics</text>
  <text x="24" y="395" fill="#A0A0A5" font-family="Inter, sans-serif" font-size="12">Use biometric authentication for quick access.</text>
  
  <text x="24" y="440" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="13">Use Touch ID</text>
  <rect x="530" y="428" width="44" height="24" rx="12" fill="#00FF80"/>
  <circle cx="562" cy="440" r="10" fill="#FFFFFF"/>
</svg>
