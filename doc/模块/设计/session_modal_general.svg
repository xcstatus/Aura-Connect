<svg width="800" height="650" viewBox="0 0 800 650" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Overlay -->
  <rect width="800" height="650" fill="rgba(0,0,0,0.6)" />
  
  <!-- Content Panel (Bg_Popup) -->
  <rect x="100" y="30" width="600" height="580" rx="10" fill="#2C2C2E" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  
  <!-- Header -->
  <text x="120" y="65" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF">新建会话</text>
  <line x1="650" y1="55" x2="670" y2="75" stroke="#A0A0A5" stroke-width="2" />
  <line x1="670" y1="55" x2="650" y2="75" stroke="#A0A0A5" stroke-width="2" />
  
  <!-- Tabs Bar -->
  <rect x="120" y="90" width="80" height="30" rx="6 6 0 0" fill="#000000" /> <!-- Active Tab Bg -->
  <text x="135" y="110" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">通用</text>
  <rect x="120" y="118" width="80" height="2" fill="#00FF80" /> <!-- Indicator -->
  
  <text x="215" y="110" font-family="Inter, sans-serif" font-size="13" fill="#A0A0A5">高级设置</text>
  <line x1="120" y1="120" x2="680" y2="120" stroke="rgba(255,255,255,0.1)" />

  <!-- Content Part: 通用页签 -->
  <!-- Name & Folder -->
  <text x="120" y="150" font-family="Inter, sans-serif" font-size="12" fill="#A0A0A5">名称</text>
  <rect x="120" y="160" width="270" height="32" rx="6" fill="#1C1C1E" />
  <text x="130" y="180" font-family="Inter, sans-serif" font-size="11" fill="#FFFFFF">Ubuntu_Dev</text>
  
  <text x="410" y="150" font-family="Inter, sans-serif" font-size="12" fill="#A0A0A5">分组</text>
  <rect x="410" y="160" width="270" height="32" rx="6" fill="#1C1C1E" />
  <text x="420" y="180" font-family="Inter, sans-serif" font-size="11" fill="#A0A0A5">未分类</text>

  <!-- Host & Port -->
  <text x="120" y="215" font-family="Inter, sans-serif" font-size="12" fill="#A0A0A5">Host / IP</text>
  <rect x="120" y="225" width="410" height="32" rx="6" fill="#1C1C1E" stroke="#00FF80" stroke-opacity="0.5" />
  <text x="130" y="245" font-family="JetBrains Mono, monospace" font-size="11" fill="#FFFFFF">10.0.0.1</text>
  
  <text x="550" y="215" font-family="Inter, sans-serif" font-size="12" fill="#A0A0A5">Port</text>
  <rect x="550" y="225" width="130" height="32" rx="6" fill="#1C1C1E" />
  <text x="560" y="245" font-family="JetBrains Mono, monospace" font-size="11" fill="#FFFFFF">22</text>

  <!-- User -->
  <text x="120" y="280" font-family="Inter, sans-serif" font-size="12" fill="#A0A0A5">用户名</text>
  <rect x="120" y="290" width="560" height="32" rx="6" fill="#1C1C1E" />
  <text x="130" y="310" font-family="Inter, sans-serif" font-size="11" fill="#FFFFFF">ubuntu</text>

  <!-- Connection Type & JumpHost -->
  <text x="120" y="345" font-family="Inter, sans-serif" font-size="12" fill="#A0A0A5">连接类型</text>
  <rect x="120" y="355" width="270" height="32" rx="6" fill="#1C1C1E" />
  <text x="130" y="375" font-family="Inter, sans-serif" font-size="11" fill="#FFFFFF">跳板机 (Jump Host)</text>
  
  <text x="410" y="345" font-family="Inter, sans-serif" font-size="12" fill="#A0A0A5">选择跳板机</text>
  <rect x="410" y="355" width="270" height="32" rx="6" fill="#1C1C1E" />
  <text x="420" y="375" font-family="Inter, sans-serif" font-size="11" fill="#FFFFFF">Borg_Server_Jump</text>

  <!-- Info Divider -->
  <line x1="120" y1="410" x2="680" y2="410" stroke="rgba(255,255,255,0.05)" />

  <!-- Authentication Part -->
  <text x="120" y="440" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#00FF80">认证信息</text>
  
  <text x="120" y="465" font-family="Inter, sans-serif" font-size="12" fill="#A0A0A5">认证方法</text>
  <!-- Radio Group Style -->
  <circle cx="210" cy="460" r="6" stroke="#00FF80" stroke-width="2" fill="none" />
  <circle cx="210" cy="460" r="3" fill="#00FF80" />
  <text x="225" y="465" font-family="Inter, sans-serif" font-size="12" fill="#FFFFFF">Password</text>
  
  <circle cx="310" cy="460" r="6" stroke="#A0A0A5" stroke-width="2" fill="none" />
  <text x="325" y="465" font-family="Inter, sans-serif" font-size="12" fill="#A0A0A5">PublicKey</text>
  
  <circle cx="410" cy="460" r="6" stroke="#A0A0A5" stroke-width="2" fill="none" />
  <text x="425" y="465" font-family="Inter, sans-serif" font-size="12" fill="#A0A0A5">Interactive</text>

  <!-- Password Detail Area -->
  <rect x="120" y="485" width="560" height="40" rx="6" fill="#1C1C1E" />
  <text x="135" y="510" font-family="Inter, sans-serif" font-size="11" fill="#6C6C70">••••••••••••</text>
  
  <!-- Footer -->
  <rect x="100" y="560" width="600" height="50" rx="0 0 10 10" fill="#232326" />
  <rect x="580" y="570" width="80" height="30" rx="6" fill="#00FF80" />
  <text x="605" y="590" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#000000">保存</text>
  <rect x="490" y="570" width="80" height="30" rx="6" fill="#3A3A3C" />
  <text x="502" y="590" font-family="Inter, sans-serif" font-size="12" fill="#FFFFFF">测试连接</text>
  <text x="430" y="590" font-family="Inter, sans-serif" font-size="12" fill="#A0A0A5">取消</text>
</svg>
