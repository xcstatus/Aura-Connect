<svg width="850" height="600" viewBox="0 0 850 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Overlay -->
  <rect width="850" height="600" fill="rgba(0,0,0,0.6)" />
  
  <!-- Main Container -->
  <rect x="50" y="50" width="750" height="500" rx="12" fill="#2C2C2E" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  
  <!-- Left Column (Sidebar Style) - 200px -->
  <rect x="50" y="50" width="200" height="500" rx="12 0 0 12" fill="#232326" />
  <line x1="250" y1="50" x2="250" y2="550" stroke="rgba(255,255,255,0.05)" />
  
  <text x="70" y="85" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">基础信息</text>
  
  <!-- Name Field (Left) -->
  <text x="70" y="120" font-family="Inter, sans-serif" font-size="11" fill="#A0A0A5">名称</text>
  <rect x="70" y="130" width="160" height="30" rx="6" fill="#1C1C1E" />
  <text x="80" y="150" font-family="Inter, sans-serif" font-size="11" fill="#FFFFFF">Ubuntu_Dev</text>
  
  <!-- Folder Field (Left) -->
  <text x="70" y="180" font-family="Inter, sans-serif" font-size="11" fill="#A0A0A5">分组</text>
  <rect x="70" y="190" width="160" height="30" rx="6" fill="#1C1C1E" />
  <text x="80" y="210" font-family="Inter, sans-serif" font-size="11" fill="#A0A0A5">未分类</text>

  <!-- Right Column (Content Area) -->
  <!-- Header -->
  <text x="270" y="85" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF">新建会话</text>
  <!-- Close Button (Top Right) -->
  <g transform="translate(760, 65)">
    <circle cx="10" cy="10" r="10" fill="transparent" />
    <line x1="5" y1="5" x2="15" y2="15" stroke="#A0A0A5" stroke-width="1.5" />
    <line x1="15" y1="5" x2="5" y2="15" stroke="#A0A0A5" stroke-width="1.5" />
  </g>

  <!-- Tabs Bar (Right) -->
  <rect x="270" y="110" width="60" height="25" rx="4" fill="#000000" />
  <text x="282" y="127" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">通用</text>
  <rect x="270" y="135" width="60" height="2" fill="#00FF80" />
  
  <text x="350" y="127" font-family="Inter, sans-serif" font-size="12" fill="#A0A0A5">高级设置</text>

  <!-- Content Part: 通用页签 (Right) -->
  <g transform="translate(270, 160)">
    <!-- Host & Port -->
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" fill="#A0A0A5">Host / IP</text>
    <rect x2="0" y="10" width="350" height="32" rx="6" fill="#1C1C1E" />
    <text x="10" y="30" font-family="JetBrains Mono, monospace" font-size="11" fill="#FFFFFF">10.0.0.1</text>
    
    <text x="370" y="0" font-family="Inter, sans-serif" font-size="11" fill="#A0A0A5">Port</text>
    <rect x="370" y="10" width="100" height="32" rx="6" fill="#1C1C1E" />
    <text x="380" y="30" font-family="JetBrains Mono, monospace" font-size="11" fill="#FFFFFF">22</text>

    <!-- User -->
    <text x="0" y="65" font-family="Inter, sans-serif" font-size="11" fill="#A0A0A5">用户名</text>
    <rect x2="0" y="75" width="470" height="32" rx="6" fill="#1C1C1E" />
    <text x="10" y="95" font-family="Inter, sans-serif" font-size="11" fill="#FFFFFF">ubuntu</text>

    <!-- Connection Type -->
    <text x="0" y="130" font-family="Inter, sans-serif" font-size="11" fill="#A0A0A5">连接类型</text>
    <rect x2="0" y="140" width="220" height="32" rx="6" fill="#1C1C1E" />
    <text x="10" y="160" font-family="Inter, sans-serif" font-size="11" fill="#FFFFFF">直连</text>
    
    <text x="250" y="130" font-family="Inter, sans-serif" font-size="11" fill="#A0A0A5">选择跳板机 (若适用)</text>
    <rect x="250" y="140" width="220" height="32" rx="6" fill="#1C1C1E" opacity="0.5" />
    <text x="260" y="160" font-family="Inter, sans-serif" font-size="11" fill="#6C6C70">未选择</text>

    <!-- Auth Divider -->
    <line x1="0" y1="200" x2="470" y2="200" stroke="rgba(255,255,255,0.05)" />

    <!-- Authentication -->
    <text x="0" y="225" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#00FF80">认证信息</text>
    <text x="0" y="250" font-family="Inter, sans-serif" font-size="11" fill="#A0A0A5">认证方法</text>
    
    <circle cx="80" cy="245" r="5" stroke="#00FF80" stroke-width="2" fill="none" />
    <circle cx="80" cy="245" r="2.5" fill="#00FF80" />
    <text x="95" y="250" font-family="Inter, sans-serif" font-size="11" fill="#FFFFFF">Password</text>
    
    <circle cx="180" cy="245" r="5" stroke="#A0A0A5" stroke-width="2" fill="none" />
    <text x="195" y="250" font-family="Inter, sans-serif" font-size="11" fill="#A0A0A5">PK</text>
  </g>

  <!-- Footer (Right Alignment) -->
  <rect x="250" y="500" width="550" height="50" rx="0 0 12 0" fill="#232326" />
  <rect x="680" y="510" width="100" height="30" rx="6" fill="#00FF80" />
  <text x="715" y="530" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#000000">保存</text>
  <text x="610" y="530" font-family="Inter, sans-serif" font-size="12" fill="#FFFFFF">测试连接</text>
</svg>
