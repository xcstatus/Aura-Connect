<svg width="600" height="500" viewBox="0 0 600 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="500" rx="12" fill="#1C1C1E"/>
  
  <!-- Padding 24px -->
  <text x="24" y="40" fill="#FFFFFF" font-family="PingFang SC, sans-serif" font-weight="700" font-size="18">保险箱安全 (Vault)</text>
  
  <!-- Item 1: Auto-Lock Timeout -->
  <text x="24" y="80" fill="#FFFFFF" font-family="PingFang SC, sans-serif" font-size="14">自动锁定超时</text>
  <text x="24" y="100" fill="#A0A0A5" font-family="PingFang SC, sans-serif" font-size="12">长时间未操作后自动锁定。选择“永不”则不自动锁定。</text>
  <rect x="352" y="70" width="224" height="32" rx="6" stroke="#3A3A3F" fill="#28282D"/>
  <text x="364" y="91" fill="#FFFFFF" font-family="PingFang SC, sans-serif" font-size="13">10 分钟</text>
  <path d="M555 86L560 91L565 86" stroke="#A0A0A5" stroke-width="2"/>

  <!-- Item 2: Lock on Background -->
  <text x="24" y="150" fill="#FFFFFF" font-family="PingFang SC, sans-serif" font-size="14">切入后台时锁定</text>
  <text x="24" y="170" fill="#A0A0A5" font-family="PingFang SC, sans-serif" font-size="12">当窗口最小化或切入后台时，立即锁定保险箱。</text>
  <rect x="532" y="146" width="44" height="24" rx="12" fill="#00FF80"/>
  <circle cx="564" cy="158" r="10" fill="white"/>

  <rect x="24" y="210" width="552" height="1" fill="#3A3A3F"/>

  <!-- Item 3: Master Password -->
  <text x="24" y="245" fill="#FFFFFF" font-family="PingFang SC, sans-serif" font-size="14">修改主密码</text>
  <text x="24" y="265" fill="#A0A0A5" font-family="PingFang SC, sans-serif" font-size="12">更改解密保险箱所用的根密钥。</text>
  <rect x="476" y="235" width="100" height="32" rx="6" fill="#3A3A3F"/>
  <text x="526" y="256" fill="#FFFFFF" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13">前往修改</text>

  <rect x="24" y="305" width="552" height="1" fill="#3A3A3F"/>

  <!-- Item 4: Biometrics -->
  <text x="24" y="340" fill="#FFFFFF" font-family="PingFang SC, sans-serif" font-weight="700" font-size="18">系统生物识别 (Biometrics)</text>
  <text x="24" y="365" fill="#FFFFFF" font-family="PingFang SC, sans-serif" font-size="14">使用系统指纹或面容认证</text>
  <text x="24" y="385" fill="#A0A0A5" font-family="PingFang SC, sans-serif" font-size="12">支持 Touch ID, Windows Hello 或系统密钥环。开启/关闭需先行认证。</text>
  <rect x="532" y="360" width="44" height="24" rx="12" fill="#00FF80"/>
  <circle cx="564" cy="372" r="10" fill="white"/>

  <!-- Auth Prompt Simulation -->
  <rect x="150" y="420" width="300" height="60" rx="8" fill="rgba(0, 255, 128, 0.1)" stroke="#00FF80" stroke-width="1"/>
  <text x="300" y="455" fill="#00FF80" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13">正在进行生物识别确认...</text>
</svg>
