<svg width="850" height="600" viewBox="0 0 850 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Overlay -->
  <rect width="850" height="600" fill="rgba(0,0,0,0.6)" />
  
  <!-- Main Container -->
  <rect x="50" y="50" width="750" height="500" rx="12" fill="#2C2C2E" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  
  <!-- Left Column (Sidebar Style) - 200px (Bg_Secondary) -->
  <rect x="50" y="50" width="200" height="500" rx="12 0 0 12" fill="#232326" />
  <line x1="250" y1="50" x2="250" y2="550" stroke="rgba(255,255,255,0.05)" />
  
  <!-- Close Button (Top Right) -->
  <g transform="translate(760, 65)">
    <circle cx="10" cy="10" r="10" fill="transparent" />
    <line x1="5" y1="5" x2="15" y2="15" stroke="#A0A0A5" stroke-width="1.5" />
    <line x1="15" y1="5" x2="5" y2="15" stroke="#A0A0A5" stroke-width="1.5" />
  </g>

  <!-- Left Content (Vertical stack) -->
  <g transform="translate(70, 90)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" fill="#A0A0A5">会话名称</text>
    <rect x="0" y="10" width="160" height="32" rx="6" fill="#1C1C1E" />
    <text x="10" y="30" font-family="Inter, sans-serif" font-size="11" fill="#FFFFFF">Ubuntu_Dev</text>
    
    <text x="0" y="70" font-family="Inter, sans-serif" font-size="11" fill="#A0A0A5">分组</text>
    <rect x="0" y="80" width="160" height="32" rx="6" fill="#1C1C1E" />
    <text x="10" y="100" font-family="Inter, sans-serif" font-size="11" fill="#A0A0A5">未分类</text>
  </g>

  <!-- Right Tabs Bar -->
  <rect x="270" y="80" width="50" height="24" rx="4" fill="#000000" />
  <text x="281" y="96" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">通用</text>
  <rect x="270" y="105" width="50" height="2" fill="#00FF80" />
  <text x="340" y="96" font-family="Inter, sans-serif" font-size="12" fill="#A0A0A5">高级设置</text>

  <!-- Content Part: 通用页签 (Right) -->
  <g transform="translate(270, 140)">
    <!-- Triple Field Row: Strategy, Host, Port -->
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" fill="#A0A0A5">连接策略</text>
    <rect x="0" y="10" width="120" height="32" rx="6" fill="#1C1C1E" />
    <text x="10" y="30" font-family="Inter, sans-serif" font-size="10" fill="#FFFFFF">直连模式</text>

    <text x="135" y="0" font-family="Inter, sans-serif" font-size="11" fill="#A0A0A5">主机 / IP</text>
    <rect x="135" y="10" width="250" height="32" rx="6" fill="#1C1C1E" stroke="#00FF80" stroke-opacity="0.3" />
    <text x="145" y="30" font-family="JetBrains Mono, monospace" font-size="10" fill="#FFFFFF">10.0.0.1</text>
    
    <text x="400" y="0" font-family="Inter, sans-serif" font-size="11" fill="#A0A0A5">端口</text>
    <rect x="400" y="10" width="85" height="32" rx="6" fill="#1C1C1E" />
    <text x="410" y="30" font-family="JetBrains Mono, monospace" font-size="10" fill="#FFFFFF">22</text>

    <!-- Jump Host (Conditional Row) -->
    <text x="0" y="65" font-family="Inter, sans-serif" font-size="11" fill="#A0A0A5">跳板机节点 (若适用)</text>
    <rect x="0" y="75" width="485" height="32" rx="6" fill="#1C1C1E" opacity="0.4" />
    <text x="10" y="95" font-family="Inter, sans-serif" font-size="11" fill="#505055">无</text>

    <!-- User -->
    <text x="0" y="130" font-family="Inter, sans-serif" font-size="11" fill="#A0A0A5">用户名</text>
    <rect x="0" y="140" width="485" height="32" rx="6" fill="#1C1C1E" />
    <text x="10" y="160" font-family="Inter, sans-serif" font-size="11" fill="#FFFFFF">ubuntu</text>

    <!-- Auth Divider -->
    <line x1="0" y1="210" x2="485" y2="210" stroke="rgba(255,255,255,0.08)" />

    <!-- Authentication -->
    <text x="0" y="235" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#00FF80">认证凭据</text>
    <g transform="translate(0, 255)">
      <circle cx="10" cy="0" r="5" stroke="#00FF80" stroke-width="2" fill="none" />
      <circle cx="10" cy="0" r="2.5" fill="#00FF80" />
      <text x="25" y="4" font-family="Inter, sans-serif" font-size="11" fill="#FFFFFF">密码</text>
      
      <circle cx="100" cy="0" r="5" stroke="#A0A0A5" stroke-width="1" fill="none" />
      <text x="115" y="4" font-family="Inter, sans-serif" font-size="11" fill="#A0A0A5">私钥</text>
      
      <circle cx="190" cy="0" r="5" stroke="#A0A0A5" stroke-width="1" fill="none" />
      <text x="205" y="4" font-family="Inter, sans-serif" font-size="11" fill="#A0A0A5">交互</text>
    </g>
  </g>

  <!-- Footer (Tone unified) -->
  <rect x="251" y="500" width="549" height="50" rx="0 0 12 0" fill="#2C2C2E" /> 
  <line x1="251" y1="500" x2="800" y2="500" stroke="rgba(255,255,255,0.05)" />
  <rect x="680" y="510" width="100" height="32" rx="6" fill="#00FF80" />
  <text x="715" y="531" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#000000">保存</text>
  <text x="600" y="531" font-family="Inter, sans-serif" font-size="12" fill="#FFFFFF">测试连接</text>
  <text x="540" y="531" font-family="Inter, sans-serif" font-size="12" fill="#A0A0A5">取消</text>
</svg>
