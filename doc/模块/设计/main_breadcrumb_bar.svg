<svg width="1024" height="600" viewBox="0 0 1024 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1024" height="600" fill="#1C1C1E" />
  
  <!-- Unified Header (32px) -->
  <rect width="1024" height="32" fill="#28282D" />
  <circle cx="20" cy="16" r="6" fill="#FF5F57" />
  <circle cx="40" cy="16" r="6" fill="#FFBD2E" />
  <circle cx="60" cy="16" r="6" fill="#28C840" />
  
  <!-- Tab Bar Item -->
  <rect x="80" y="0" width="160" height="32" rx="4 4 0 0" fill="#000000" />
  <text x="95" y="21" font-family="Inter, sans-serif" font-size="12" fill="#FFFFFF">Production_DB</text>
  <text x="220" y="21" font-family="Inter, sans-serif" font-size="12" fill="#6C6C70">×</text>

  <!-- New Area: Breadcrumb Bar (36px) -->
  <rect y="32" width="1024" height="36" fill="#232326" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  
  <!-- IP Path / Connection Path -->
  <g transform="translate(16, 54)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#00FF80">Borg_Jump</text>
    <text x="65" y="0" font-family="Inter, sans-serif" font-size="11" fill="#6C6C70">/</text>
    <text x="75" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF">10.0.1.5</text>
    
    <!-- Path Divider -->
    <rect x="140" y="-14" width="1" height="16" fill="rgba(255,255,255,0.1)" />
    
    <!-- Current Directory -->
    <text x="155" y="0" font-family="JetBrains Mono, monospace" font-size="11" fill="#A0A0A5">~/projects/rust_ssh/src</text>
  </g>

  <!-- Quick Action Buttons (Right) -->
  <g transform="translate(750, 40)">
    <!-- Reconnect -->
    <rect x="0" y="0" width="70" height="22" rx="4" fill="#3A3A3C" />
    <text x="10" y="15" font-family="Inter, sans-serif" font-size="10" fill="#FFFFFF">重新连接</text>
    
    <!-- SFTP -->
    <rect x="80" y="0" width="50" height="22" rx="4" fill="#3A3A3C" />
    <text x="92" y="15" font-family="Inter, sans-serif" font-size="10" fill="#FFFFFF">SFTP</text>
    
    <!-- Port -->
    <rect x="140" y="0" width="50" height="22" rx="4" fill="#3A3A3C" stroke="#00FF80" stroke-opacity="0.3" />
    <text x="152" y="15" font-family="Inter, sans-serif" font-size="10" fill="#00FF80">端口</text>
    
    <!-- More Tools -->
    <text x="210" y="16" font-family="Inter, sans-serif" font-size="14" fill="#6C6C70">⋮</text>
  </g>

  <!-- Terminal Area (Main) -->
  <rect y="68" width="1024" height="532" fill="#000000" />
  <text x="16" y="95" font-family="JetBrains Mono, monospace" font-size="13" fill="#FFFFFF">ubuntu@borg-production:~/projects/rust_ssh/src$ _</text>
  <rect x="360" y="85" width="8" height="16" fill="#00FF80" opacity="0.8" />
</svg>
