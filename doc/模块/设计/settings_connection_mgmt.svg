<svg width="850" height="600" viewBox="0 0 850 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Overlay -->
  <rect width="850" height="600" fill="rgba(0,0,0,0.6)" />
  
  <!-- Main Container -->
  <rect x="50" y="50" width="750" height="500" rx="12" fill="#2C2C2E" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  
  <!-- Left Column (Sidebar) - 200px (Bg_Secondary) -->
  <rect x="50" y="50" width="200" height="500" rx="12 0 0 12" fill="#232326" />
  <line x1="250" y1="50" x2="250" y2="550" stroke="rgba(255,255,255,0.05)" />
  
  <!-- Sidebar Navigation -->
  <g transform="translate(60, 90)">
    <rect x="0" y="0" width="180" height="36" rx="6" fill="transparent" />
    <text x="12" y="24" font-family="Inter, sans-serif" font-size="13" fill="#A0A0A5">通用</text>
    
    <rect x="0" y="44" width="180" height="36" rx="6" fill="#2C2C2E" />
    <rect x="0" y="44" width="2" height="36" fill="#00FF80" />
    <text x="12" y="68" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">连接管理</text>
    
    <text x="12" y="112" font-family="Inter, sans-serif" font-size="13" fill="#A0A0A5">外观设置</text>
    <text x="12" y="156" font-family="Inter, sans-serif" font-size="13" fill="#A0A0A5">安全与 Vault</text>
  </g>

  <!-- Right Content Area (Connection Management) -->
  <g transform="translate(280, 80)">
    <!-- Section: Timeout & Reconnect -->
    <text x="0" y="20" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">连接策略</text>
    
    <text x="0" y="55" font-family="Inter, sans-serif" font-size="11" fill="#A0A0A5">连接超时 (秒)</text>
    <rect x="0" y="65" width="220" height="32" rx="6" fill="#1C1C1E" />
    <text x="12" y="85" font-family="JetBrains Mono, monospace" font-size="11" fill="#FFFFFF">10</text>
    
    <text x="250" y="55" font-family="Inter, sans-serif" font-size="11" fill="#A0A0A5">自动重连次数</text>
    <rect x="250" y="65" width="220" height="32" rx="6" fill="#1C1C1E" />
    <text x="262" y="85" font-family="JetBrains Mono, monospace" font-size="11" fill="#FFFFFF">3</text>

    <!-- Section: Keepalive -->
    <text x="0" y="130" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">心跳保活</text>
    
    <rect x="0" y="150" width="470" height="40" rx="8" fill="#1C1C1E" />
    <rect x="12" y="162" width="32" height="16" rx="8" fill="#00FF80" />
    <circle cx="24" cy="170" r="6" fill="#000000" />
    <text x="55" y="176" font-family="Inter, sans-serif" font-size="12" fill="#FFFFFF">启用 TCP Keepalive</text>

    <text x="0" y="220" font-family="Inter, sans-serif" font-size="11" fill="#A0A0A5">心跳发送间隔 (秒)</text>
    <rect x="0" y="230" width="470" height="32" rx="6" fill="#1C1C1E" />
    <text x="12" y="250" font-family="JetBrains Mono, monospace" font-size="11" fill="#FFFFFF">60</text>
    <text x="440" y="250" font-family="Inter, sans-serif" font-size="10" fill="#6C6C70">sec</text>

    <!-- Section: Optimization -->
    <text x="0" y="300" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">性能优化</text>
    <rect x="0" y="320" width="470" height="44" rx="8" fill="#1C1C1E" />
    <rect x="12" y="334" width="32" height="16" rx="8" fill="#3A3A3C" />
    <circle cx="20" cy="342" r="6" fill="#A0A0A5" />
    <text x="55" y="348" font-family="Inter, sans-serif" font-size="12" fill="#FFFFFF">使用压缩传输 (Compression)</text>
  </g>

  <!-- Close Button -->
  <g transform="translate(760, 65)">
    <line x1="5" y1="5" x2="15" y2="15" stroke="#A0A0A5" stroke-width="1.5" />
    <line x1="15" y1="5" x2="5" y2="15" stroke="#A0A0A5" stroke-width="1.5" />
  </g>
</svg>
