<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Overlay -->
  <rect width="600" height="400" rx="12" fill="rgba(0,0,0,0.8)"/>
  
  <!-- Onboarding Modal Container -->
  <rect x="100" y="80" width="400" height="240" rx="12" fill="#28282D" stroke="#00FF80" stroke-width="1.5"/>
  
  <!-- Content -->
  <text x="300" y="130" fill="#FFFFFF" text-anchor="middle" font-family="PingFang SC, sans-serif" font-weight="700" font-size="18">初始化安全保险箱</text>
  
  <text x="300" y="165" fill="#A0A0A5" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13">看起来这是您第一次保存 SSH 密钥。</text>
  <text x="300" y="185" fill="#A0A0A5" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13">为了保护您的凭据安全，请首先设置保险箱主密码。</text>
  
  <!-- Buttons -->
  <rect x="230" y="240" width="140" height="40" rx="6" fill="#00FF80"/>
  <text x="300" y="265" fill="#000000" text-anchor="middle" font-family="PingFang SC, sans-serif" font-weight="600" font-size="14">立即设置并继续</text>
  
  <text x="300" y="305" fill="#A0A0A5" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11">主密码用于推导全库加密密钥，丢失后无法找回。</text>
</svg>
