<svg width="800" height="650" viewBox="0 0 800 650" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Overlay -->
  <rect width="800" height="650" fill="rgba(0,0,0,0.6)" />
  
  <!-- Content Panel (Bg_Popup) -->
  <rect x="100" y="30" width="600" height="580" rx="10" fill="#2C2C2E" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  
  <!-- Header -->
  <text x="120" y="65" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF">新建会话</text>
  
  <!-- Tabs Bar -->
  <text x="135" y="110" font-family="Inter, sans-serif" font-size="13" fill="#A0A0A5">通用</text>
  
  <rect x="200" y="90" width="100" height="30" rx="6 6 0 0" fill="#000000" />
  <text x="215" y="110" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">高级设置</text>
  <rect x="200" y="118" width="100" height="2" fill="#00FF80" />
  
  <line x1="120" y1="120" x2="680" y2="120" stroke="rgba(255,255,255,0.1)" />

  <!-- Content Part: 高级设置页签 -->
  <text x="120" y="160" font-family="Inter, sans-serif" font-size="12" fill="#A0A0A5">保活间隔 (毫秒)</text>
  <rect x="120" y="170" width="560" height="32" rx="6" fill="#1C1C1E" />
  <text x="135" y="190" font-family="JetBrains Mono, monospace" font-size="11" fill="#FFFFFF">5000</text>
  
  <text x="120" y="230" font-family="Inter, sans-serif" font-size="12" fill="#A0A0A5">最大保活次数</text>
  <rect x="120" y="240" width="560" height="32" rx="6" fill="#1C1C1E" />
  <text x="135" y="260" font-family="JetBrains Mono, monospace" font-size="11" fill="#FFFFFF">3</text>
  
  <text x="120" y="300" font-family="Inter, sans-serif" font-size="12" fill="#A0A0A5">准备超时 (毫秒)</text>
  <rect x="120" y="310" width="560" height="32" rx="6" fill="#1C1C1E" />
  <text x="135" y="330" font-family="JetBrains Mono, monospace" font-size="11" fill="#FFFFFF">10000</text>
  
  <!-- Footer -->
  <rect x="100" y="560" width="600" height="50" rx="0 0 10 10" fill="#232326" />
  <rect x="580" y="570" width="80" height="30" rx="6" fill="#00FF80" />
  <text x="605" y="590" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#000000">保存</text>
</svg>
