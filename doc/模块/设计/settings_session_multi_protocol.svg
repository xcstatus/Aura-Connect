<svg width="850" height="600" viewBox="0 0 850 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Overlay -->
  <rect width="850" height="600" fill="rgba(0,0,0,0.6)" />
  
  <!-- Main Container -->
  <rect x="50" y="50" width="750" height="500" rx="12" fill="#2C2C2E" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  
  <!-- Left Column (Sidebar) -->
  <rect x="50" y="50" width="200" height="500" rx="12 0 0 12" fill="#232326" />
  <line x1="250" y1="50" x2="250" y2="550" stroke="rgba(255,255,255,0.05)" />
  
  <g transform="translate(60, 90)">
    <text x="12" y="24" font-family="Inter, sans-serif" font-size="13" fill="#A0A0A5">通用</text>
    <text x="12" y="68" font-family="Inter, sans-serif" font-size="13" fill="#A0A0A5">连接管理</text>
    <rect x="0" y="88" width="180" height="36" rx="6" fill="#2C2C2E" />
    <rect x="0" y="88" width="2" height="36" fill="#00FF80" />
    <text x="12" y="112" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">连接信息管理</text>
    <text x="12" y="156" font-family="Inter, sans-serif" font-size="13" fill="#A0A0A5">外观设置</text>
  </g>

  <!-- Right Content Area (Multi-Protocol Tabs) -->
  <g transform="translate(280, 80)">
    <!-- Multi-Tabs Bar -->
    <rect x="0" y="0" width="50" height="24" rx="4" fill="#000000" />
    <text x="11" y="16" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">SSH</text>
    <rect x="0" y="25" width="50" height="2" fill="#00FF80" />
    
    <text x="70" y="16" font-family="Inter, sans-serif" font-size="12" fill="#A0A0A5">TELNET</text>
    <text x="140" y="16" font-family="Inter, sans-serif" font-size="12" fill="#A0A0A5">SERIAL</text>
    <text x="210" y="16" font-family="Inter, sans-serif" font-size="12" fill="#A0A0A5">高级设置</text>
    
    <!-- Action Line -->
    <line x1="0" y1="35" x2="470" y2="35" stroke="rgba(255,255,255,0.05)" />

    <!-- List View (Specific to SSH Tab) -->
    <g transform="translate(0, 55)">
      <rect x="0" y="0" width="410" height="30" rx="6" fill="#1C1C1E" stroke="rgba(255,255,255,0.08)" />
      <text x="10" y="19" font-family="Inter, sans-serif" font-size="10" fill="#6C6C70">搜索 SSH 会话...</text>
      <text x="430" y="19" font-family="Inter, sans-serif" font-size="12" fill="#5AC8FA">+ 新增</text>

      <!-- Table Header -->
      <g transform="translate(0, 45)">
        <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#A0A0A5">连接名称</text>
        <text x="180" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#A0A0A5">目标地址</text>
        <text x="350" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#A0A0A5">分组</text>
        <line x1="0" y1="12" x2="470" y2="12" stroke="rgba(255,255,255,0.05)" />

        <!-- Row 1 (SSH) -->
        <g transform="translate(0, 35)">
          <text x="0" y="10" font-family="Inter, sans-serif" font-size="12" fill="#FFFFFF">Production_Main</text>
          <text x="180" y="10" font-family="JetBrains Mono, monospace" font-size="11" fill="#A0A0A5">1.2.3.4:22</text>
          <text x="350" y="10" font-family="Inter, sans-serif" font-size="11" fill="#00FF80">PROD</text>
        </g>
        
        <!-- Row 2 (SSH) -->
        <g transform="translate(0, 75)">
          <text x="0" y="10" font-family="Inter, sans-serif" font-size="12" fill="#FFFFFF">Staging_Env</text>
          <text x="180" y="10" font-family="JetBrains Mono, monospace" font-size="11" fill="#A0A0A5">172.16.0.5:22</text>
          <text x="350" y="10" font-family="Inter, sans-serif" font-size="11" fill="#6C6C70">TEST</text>
        </g>
      </g>
    </g>
  </g>

  <!-- Close X -->
  <g transform="translate(760, 65)">
    <line x1="5" y1="5" x2="15" y2="15" stroke="#A0A0A5" stroke-width="1.5" />
    <line x1="15" y1="5" x2="5" y2="15" stroke="#A0A0A5" stroke-width="1.5" />
  </g>
</svg>
